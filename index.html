    <script>
      // Pre-paint theme default: light for all visitors unless they've explicitly
      // picked dark via the DarkModeToggle. A welcoming light surface is
      // friendlier for first-time seniors/beginners than a dark starfield.
      // Mirrors RouteThemeDefault in App.tsx.
      (function () {
        try {
          var stored = localStorage.getItem('teksure-theme');
          if (stored === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (_) { /* no-op */ }
      })();
    </script>
