name: Auto-merge Claude & bot branches

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  auto-merge:
    if: |
      startsWith(github.head_ref, 'claude/') ||
      startsWith(github.head_ref, 'codex/') ||
      startsWith(github.head_ref, 'vercel/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Mark draft as ready-for-review (if needed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.event.pull_request.draft == true }}
        run: |
          gh pr ready "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}"

      - name: Squash-merge and delete branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
