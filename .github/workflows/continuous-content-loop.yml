name: TekSure continuous-content-loop

# Runs every hour. Each cycle picks one content type (rotated by state):
# new guide, freshness update, scam alert, or weekly tip. Changes land in
# a draft pull request rather than going straight to main.

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Force a specific action (guide|freshness|alert|tip)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no writes, no PR)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: continuous-content-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Configure git
        run: |
          git config user.name "teksure-content-bot[bot]"
          git config user.email "teksure-content-bot[bot]@users.noreply.github.com"

      - name: Run continuous-content-loop
        id: loop
        env:
          FORCED_ACTION: ${{ inputs.action }}
          DRY: ${{ inputs.dry_run || 'false' }}
        run: |
          ARGS=""
          if [ -n "$FORCED_ACTION" ]; then ARGS="--action=$FORCED_ACTION"; fi
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/continuous-content-loop.mjs $ARGS

      - name: Open or update pull request
        if: ${{ steps.loop.outputs.changed == 'true' && inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION_TYPE: ${{ steps.loop.outputs.action }}
        run: |
          set -e
          BRANCH="claude/continuous-content"
          DATE=$(date -u +%Y-%m-%d)

          # Reset onto a fresh branch from main so each PR is a clean delta.
          git checkout -B "$BRANCH"

          git add src/data/guides.ts src/data/guides-batch-*.ts .claude/continuous-content-state.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No staged changes after action; skipping PR."
            exit 0
          fi

          MSG="feat(content): continuous-content-loop ${ACTION_TYPE} ${DATE}"
          git commit -m "$MSG"

          for delay in 0 2 4 8 16; do
            if [ "$delay" != "0" ]; then sleep "$delay"; fi
            if git push -f -u origin "$BRANCH"; then
              echo "Pushed $BRANCH"
              break
            fi
          done

          # Open a PR if one is not already open for this branch.
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || echo "")
          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --draft \
              --base main \
              --head "$BRANCH" \
              --title "Continuous content: ${ACTION_TYPE} (${DATE})" \
              --body "Auto-generated by .github/workflows/continuous-content-loop.yml. Action: \`${ACTION_TYPE}\`. Review and merge when ready."
          else
            echo "Existing PR #$PR_NUMBER updated with new commit."
          fi
